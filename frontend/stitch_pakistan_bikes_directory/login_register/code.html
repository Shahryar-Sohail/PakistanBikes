<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<style>
        .blueprint-grid {
            background-size: 24px 24px;
            background-image: 
                linear-gradient(to right, rgba(28, 28, 30, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(28, 28, 30, 0.05) 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col relative blueprint-grid">
<!-- Top Navigation Omitted due to "Linear/Transactional: Login" logic -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop z-10 relative">
<!-- Auth Card -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl border border-outline/10 shadow-sm relative overflow-hidden">
<!-- Subtle accent top -->
<div class="absolute top-0 left-0 right-0 h-1 bg-primary"></div>
<div class="p-8">
<!-- Brand Header -->
<div class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">PK Bikes</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">National Kinetic Performance</p>
</div>
<!-- Tab Switchers -->
<div class="flex border-b border-outline-variant/30 mb-8 relative">
<button class="flex-1 pb-4 text-center font-label-md text-label-md text-primary relative focus:outline-none" id="tab-login">
                        Login
                        <!-- Active Underline -->
<span class="absolute bottom-0 left-0 right-0 h-[3px] bg-primary rounded-t-full transition-all duration-300 transform scale-x-100" id="indicator-login"></span>
</button>
<button class="flex-1 pb-4 text-center font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors focus:outline-none" id="tab-register">
                        Register
                        <span class="absolute bottom-0 left-0 right-0 h-[3px] bg-primary rounded-t-full transition-all duration-300 transform scale-x-0" id="indicator-register"></span>
</button>
</div>
<!-- Login Form (Active) -->
<form class="space-y-6" id="form-login">
<div class="space-y-4">
<!-- Email Input -->
<div class="relative">
<label class="sr-only font-label-sm text-label-sm" for="email">Email Address</label>
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline/20 rounded-lg font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" id="email" name="email" placeholder="Email Address" type="email"/>
</div>
<!-- Password Input -->
<div class="relative">
<label class="sr-only font-label-sm text-label-sm" for="password">Password</label>
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="w-full pl-10 pr-10 py-3 bg-surface-container-low border border-outline/20 rounded-lg font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" id="password" name="password" placeholder="Password" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</div>
</div>
</div>
<!-- Options -->
<div class="flex items-center justify-between">
<label class="flex items-center cursor-pointer group">
<input class="form-checkbox h-4 w-4 text-primary border-outline-variant rounded focus:ring-primary/50 transition-colors" type="checkbox"/>
<span class="ml-2 font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label-sm text-label-sm text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Submit -->
<button class="w-full bg-primary hover:bg-surface-tint text-on-primary font-label-md text-label-md py-3 rounded-lg shadow-sm hover:-translate-y-1 hover:shadow-md transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="submit">
                        Sign In
                    </button>
<!-- Divider -->
<div class="relative py-4">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center">
<span class="px-3 bg-surface-container-lowest font-label-sm text-label-sm text-outline">Or continue with</span>
</div>
</div>
<!-- Social Login -->
<button class="w-full bg-surface-container hover:bg-surface-container-high border border-outline/10 text-on-surface font-label-md text-label-md py-3 rounded-lg transition-colors flex items-center justify-center space-x-2" type="button">
<svg class="h-5 w-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Google</span>
</button>
</form>
<!-- Register Form (Hidden placeholder logic for demonstration) -->
<form class="hidden space-y-6" id="form-register">
<p class="font-body-md text-body-md text-on-surface-variant text-center py-8">Registration fields would appear here.</p>
</form>
</div>
</div>
</main>
<!-- Footer Omitted as this is a focused Transactional Screen -->
<script>
        // Simple Tab Switching Logic
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const indLogin = document.getElementById('indicator-login');
        const indRegister = document.getElementById('indicator-register');
        const formLogin = document.getElementById('form-login');
        const formRegister = document.getElementById('form-register');

        tabRegister.addEventListener('click', () => {
            // Update Text Colors
            tabRegister.classList.remove('text-on-surface-variant');
            tabRegister.classList.add('text-primary');
            tabLogin.classList.remove('text-primary');
            tabLogin.classList.add('text-on-surface-variant');
            
            // Update Indicators
            indLogin.classList.replace('scale-x-100', 'scale-x-0');
            indRegister.classList.replace('scale-x-0', 'scale-x-100');

            // Swap Forms
            formLogin.classList.add('hidden');
            formRegister.classList.remove('hidden');
        });

        tabLogin.addEventListener('click', () => {
             // Update Text Colors
            tabLogin.classList.remove('text-on-surface-variant');
            tabLogin.classList.add('text-primary');
            tabRegister.classList.remove('text-primary');
            tabRegister.classList.add('text-on-surface-variant');
            
            // Update Indicators
            indRegister.classList.replace('scale-x-100', 'scale-x-0');
            indLogin.classList.replace('scale-x-0', 'scale-x-100');

            // Swap Forms
            formRegister.classList.add('hidden');
            formLogin.classList.remove('hidden');
        });
    </script>
</body></html>
